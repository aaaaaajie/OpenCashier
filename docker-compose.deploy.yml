# Standard image-based deployment stack for server environments.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cashier}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cashier}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${OPENCASHIER_REGISTRY:-ghcr.io}/${OPENCASHIER_NAMESPACE:-aaaaaajie}/opencashier-api:${OPENCASHIER_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      PLATFORM_CONFIG_MASTER_KEY: ${PLATFORM_CONFIG_MASTER_KEY:?PLATFORM_CONFIG_MASTER_KEY is required}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      WEB_BASE_URL: ${WEB_BASE_URL:?WEB_BASE_URL is required}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-cashier}?schema=public}
      SKIP_PRISMA_DB_PUSH: ${SKIP_PRISMA_DB_PUSH:-0}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    image: ${OPENCASHIER_REGISTRY:-ghcr.io}/${OPENCASHIER_NAMESPACE:-aaaaaajie}/opencashier-web:${OPENCASHIER_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      APP_API_BASE_URL: ${APP_API_BASE_URL:-/api/v1}
    ports:
      - "${WEB_PUBLISHED_BIND:-0.0.0.0}:${WEB_PUBLISHED_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
