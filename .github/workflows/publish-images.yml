name: Publish Images

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to publish images for
        required: true
        type: string
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish images for
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    env:
      MIRROR_REGISTRY: ${{ vars.MIRROR_REGISTRY }}
      MIRROR_NAMESPACE: ${{ vars.MIRROR_NAMESPACE }}
      MIRROR_REGISTRY_USERNAME: ${{ secrets.MIRROR_REGISTRY_USERNAME }}
      MIRROR_REGISTRY_PASSWORD: ${{ secrets.MIRROR_REGISTRY_PASSWORD }}
      MIRROR_ENABLED: ${{ vars.MIRROR_REGISTRY != '' && vars.MIRROR_NAMESPACE != '' && secrets.MIRROR_REGISTRY_USERNAME != '' && secrets.MIRROR_REGISTRY_PASSWORD != '' }}
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: ./Dockerfile.api
          - service: web
            dockerfile: ./Dockerfile.web
    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "workflow_call" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"

          if [[ "$tag" == *-* ]]; then
            echo "stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "stable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_tag.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to mirror registry
        if: ${{ env.MIRROR_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.MIRROR_REGISTRY }}
          username: ${{ env.MIRROR_REGISTRY_USERNAME }}
          password: ${{ env.MIRROR_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            name=ghcr.io/${{ github.repository_owner }}/opencashier-${{ matrix.service }}
            name=${{ env.MIRROR_REGISTRY }}/${{ env.MIRROR_NAMESPACE }}/opencashier-${{ matrix.service }},enable=${{ env.MIRROR_ENABLED == 'true' }}
          tags: |
            type=raw,value=${{ steps.release_tag.outputs.tag }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ steps.release_tag.outputs.stable == 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
