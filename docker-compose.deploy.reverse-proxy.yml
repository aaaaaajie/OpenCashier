# Additional network attachment for deployments behind an existing
# Dockerized reverse proxy such as Nginx, Caddy, or Traefik.
services:
  api:
    networks:
      default:
      reverse-proxy:
        aliases:
          - ${OPENCASHIER_API_NETWORK_ALIAS:-opencashier-api}

  web:
    networks:
      default:
      reverse-proxy:
        aliases:
          - ${OPENCASHIER_WEB_NETWORK_ALIAS:-opencashier-web}

networks:
  reverse-proxy:
    external: true
    name: ${OPENCASHIER_REVERSE_PROXY_NETWORK:?OPENCASHIER_REVERSE_PROXY_NETWORK is required}
