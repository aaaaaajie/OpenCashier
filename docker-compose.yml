services:
  postgres:
    image: postgres:16
    container_name: cashier-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cashier
      POSTGRES_USER: cashier
      POSTGRES_PASSWORD: cashier
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cashier-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

