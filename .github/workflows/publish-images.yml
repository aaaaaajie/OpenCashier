name: Publish Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    env:
      MIRROR_REGISTRY: ${{ vars.MIRROR_REGISTRY }}
      MIRROR_NAMESPACE: ${{ vars.MIRROR_NAMESPACE }}
      MIRROR_REGISTRY_USERNAME: ${{ secrets.MIRROR_REGISTRY_USERNAME }}
      MIRROR_REGISTRY_PASSWORD: ${{ secrets.MIRROR_REGISTRY_PASSWORD }}
      MIRROR_ENABLED: ${{ vars.MIRROR_REGISTRY != '' && vars.MIRROR_NAMESPACE != '' && secrets.MIRROR_REGISTRY_USERNAME != '' && secrets.MIRROR_REGISTRY_PASSWORD != '' }}
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: ./Dockerfile.api
          - service: web
            dockerfile: ./Dockerfile.web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to mirror registry
        if: ${{ env.MIRROR_ENABLED == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.MIRROR_REGISTRY }}
          username: ${{ env.MIRROR_REGISTRY_USERNAME }}
          password: ${{ env.MIRROR_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            name=ghcr.io/${{ github.repository_owner }}/opencashier-${{ matrix.service }}
            name=${{ env.MIRROR_REGISTRY }}/${{ env.MIRROR_NAMESPACE }}/opencashier-${{ matrix.service }},enable=${{ env.MIRROR_ENABLED == 'true' }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
